services:
  app:
    build: .
    image: aristowrap-lean:local
    # Avoid `docker pull aristowrap-lean:local` (Hub denies unknown repos → noisy + confusing).
    pull_policy: never
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - aristotle.env
    stdin_open: true
    tty: true
